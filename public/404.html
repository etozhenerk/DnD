<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Переход в Атлас приключений</title>
    <script>
      (function () {
        var base = '/DnD/';
        var path = window.location.pathname.indexOf(base) === 0
          ? window.location.pathname.slice(base.length - 1)
          : '/';
        var destination = base + '?route=' + encodeURIComponent(path + window.location.search + window.location.hash);
        window.location.replace(destination);
      }());
    </script>
  </head>
  <body></body>
</html>
